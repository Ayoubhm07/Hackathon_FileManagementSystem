services:
  # -------------------------
  # MongoDB (private) + disk
  # -------------------------
  - type: private_service
    name: mongodb
    env: docker
    plan: starter
    autoDeploy: true
    dockerCommand: >
      mongod --bind_ip_all
    envVars:
      - key: MONGO_INITDB_ROOT_USERNAME
        value: docflow_admin
      - key: MONGO_INITDB_ROOT_PASSWORD
        sync: false
      - key: MONGO_INITDB_DATABASE
        value: docflow
    disk:
      name: mongodb-data
      mountPath: /data/db
      sizeGB: 5

  # -------------------------
  # MinIO (private) + disk
  # -------------------------
  - type: private_service
    name: minio
    env: docker
    plan: starter
    autoDeploy: true
    image:
      url: minio/minio:latest
    dockerCommand: server /data --console-address ":9001"
    envVars:
      - key: MINIO_ROOT_USER
        value: docflow_minio
      - key: MINIO_ROOT_PASSWORD
        sync: false
    disk:
      name: minio-data
      mountPath: /data
      sizeGB: 10

  # -------------------------
  # Keycloak Postgres (private) + disk
  # -------------------------
  - type: private_service
    name: keycloak-postgres
    env: docker
    plan: starter
    autoDeploy: true
    image:
      url: postgres:15-alpine
    envVars:
      - key: POSTGRES_USER
        value: keycloak
      - key: POSTGRES_PASSWORD
        sync: false
      - key: POSTGRES_DB
        value: keycloak
    disk:
      name: keycloak-postgres-data
      mountPath: /var/lib/postgresql/data
      sizeGB: 5

  # -------------------------
  # Keycloak (public)
  # -------------------------
  - type: web
    name: keycloak
    env: docker
    plan: starter
    autoDeploy: true
    image:
      url: quay.io/keycloak/keycloak:23.0
    dockerCommand: start-dev --import-realm
    healthCheckPath: /health/ready
    envVars:
      - key: KEYCLOAK_ADMIN
        value: admin
      - key: KEYCLOAK_ADMIN_PASSWORD
        sync: false

      - key: KC_DB
        value: postgres
      - key: KC_DB_URL
        value: jdbc:postgresql://keycloak-postgres:5432/keycloak
      - key: KC_DB_USERNAME
        value: keycloak
      - key: KC_DB_PASSWORD
        sync: false
      - key: KC_HTTP_PORT
        value: "8080"

    # NOTE IMPORT REALM/THEMES:
    # Ton docker-compose utilisait des volumes depuis le repo vers /opt/keycloak/...
    # Render ne permet pas ce "bind mount" du repo.
    # Donc --import-realm ne trouvera rien tant qu’on n’a pas une image custom qui COPY ces fichiers.
    # Pour une démo rapide: fais l'import via l'UI Keycloak (manuel) ou dis-moi et je te fais l'image custom.

  # -------------------------
  # Private backend services (from repo Dockerfiles)
  # -------------------------
  - type: private_service
    name: auth-service
    env: docker
    plan: starter
    autoDeploy: true
    rootDir: services/auth-service
    envVars:
      - key: AUTH_SERVICE_PORT
        value: "8081"
      - key: KEYCLOAK_URL
        value: http://keycloak:8080
      - key: KEYCLOAK_REALM
        value: docflow
      - key: KEYCLOAK_ADMIN
        value: admin
      - key: KEYCLOAK_ADMIN_PASSWORD
        sync: false

  - type: private_service
    name: upload-service
    env: docker
    plan: starter
    autoDeploy: true
    rootDir: services/upload-service
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: MONGO_URI
        # internal hostname "mongodb" like in compose
        value: mongodb://docflow_admin:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/docflow?authSource=admin
      - key: MINIO_ENDPOINT
        value: minio
      - key: MINIO_PORT
        value: "9000"
      - key: MINIO_USE_SSL
        value: "false"
      - key: MINIO_ACCESS_KEY
        value: docflow_minio
      - key: MINIO_SECRET_KEY
        sync: false
      - key: LOG_LEVEL
        value: info

  - type: private_service
    name: validation-service
    env: docker
    plan: starter
    autoDeploy: true
    rootDir: services/validation-service
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3002"
      - key: MONGO_URI
        value: mongodb://docflow_admin:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/docflow?authSource=admin
      - key: LOG_LEVEL
        value: info

  - type: private_service
    name: ocr-service
    env: docker
    plan: starter
    autoDeploy: true
    rootDir: services/ocr-service
    envVars:
      - key: PORT
        value: "8001"
      - key: MONGO_URI
        value: mongodb://docflow_admin:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/docflow?authSource=admin
      - key: MINIO_ENDPOINT
        value: minio:9000
      - key: MINIO_PORT
        value: "9000"
      - key: MINIO_USE_SSL
        value: "false"
      - key: MINIO_ACCESS_KEY
        value: docflow_minio
      - key: MINIO_SECRET_KEY
        sync: false
      - key: LOG_LEVEL
        value: info

  - type: private_service
    name: classification-service
    env: docker
    plan: starter
    autoDeploy: true
    rootDir: services/classification-service
    envVars:
      - key: PORT
        value: "8002"
      - key: MINIO_ENDPOINT
        value: minio:9000
      - key: MINIO_USE_SSL
        value: "false"
      - key: MINIO_ACCESS_KEY
        value: docflow_minio
      - key: MINIO_SECRET_KEY
        sync: false
      - key: LOG_LEVEL
        value: info
    disk:
      # pour les modèles si besoin de persistance en démo
      name: classification-models
      mountPath: /app/models
      sizeGB: 5

  - type: private_service
    name: extraction-service
    env: docker
    plan: starter
    autoDeploy: true
    rootDir: services/extraction-service
    envVars:
      - key: PORT
        value: "8003"
      - key: MONGO_URI
        value: mongodb://docflow_admin:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/docflow?authSource=admin
      - key: MINIO_ENDPOINT
        value: minio:9000
      - key: MINIO_PORT
        value: "9000"
      - key: MINIO_USE_SSL
        value: "false"
      - key: MINIO_ACCESS_KEY
        value: docflow_minio
      - key: MINIO_SECRET_KEY
        sync: false
      - key: LOG_LEVEL
        value: info

  # -------------------------
  # API Gateway (public entrypoint)
  # -------------------------
  - type: web
    name: api-gateway
    env: docker
    plan: starter
    autoDeploy: true
    rootDir: services/api-gateway
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: KEYCLOAK_URL
        value: http://keycloak:8080
      - key: KEYCLOAK_REALM
        value: docflow
      - key: UPLOAD_SERVICE_URL
        value: http://upload-service:3001
      - key: VALIDATION_SERVICE_URL
        value: http://validation-service:3002
      - key: AUTH_SERVICE_URL
        value: http://auth-service:8081
      - key: EXTRACTION_SERVICE_URL
        value: http://extraction-service:8003
      - key: CORS_ORIGIN
        sync: false
      - key: LOG_LEVEL
        value: info

  # -------------------------
  # Frontends (public)
  # -------------------------
  - type: web
    name: frontend-crm
    env: docker
    plan: starter
    autoDeploy: true
    rootDir: services/frontend-crm
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_KEYCLOAK_URL
        sync: false
      - key: VITE_KEYCLOAK_REALM
        value: docflow
      - key: VITE_KEYCLOAK_CLIENT_ID
        value: crm-app

  - type: web
    name: frontend-compliance
    env: docker
    plan: starter
    autoDeploy: true
    rootDir: services/frontend-compliance
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_KEYCLOAK_URL
        sync: false
      - key: VITE_KEYCLOAK_REALM
        value: docflow
      - key: VITE_KEYCLOAK_CLIENT_ID
        value: compliance-app
