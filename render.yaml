# Render Blueprint for DocFlow (services with Dockerfiles in /services/*)
#
# External dependencies to configure in Render (or external providers):
# - MongoDB (MONGO_URI)
# - MinIO / S3-compatible storage (MINIO_*)
# - Keycloak (KEYCLOAK_*)

databases:
  - name: airflow-postgres
    databaseName: airflow
    user: airflow

services:
  - type: web
    name: api-gateway
    env: docker
    dockerfilePath: ./services/api-gateway/Dockerfile
    dockerContext: ./services/api-gateway
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: KEYCLOAK_URL
        sync: false
      - key: KEYCLOAK_REALM
        value: docflow
      - key: UPLOAD_SERVICE_URL
        value: http://upload-service:3001
      - key: VALIDATION_SERVICE_URL
        value: http://validation-service:3002
      - key: AUTH_SERVICE_URL
        value: http://auth-service:8080
      - key: THROTTLE_TTL
        value: "60"
      - key: THROTTLE_LIMIT
        value: "100"
      - key: CORS_ORIGIN
        sync: false
      - key: LOG_LEVEL
        value: info

  - type: pserv
    name: auth-service
    env: docker
    dockerfilePath: ./services/auth-service/Dockerfile
    dockerContext: ./services/auth-service
    envVars:
      - key: AUTH_SERVICE_PORT
        value: "8080"
      - key: KEYCLOAK_URL
        sync: false
      - key: KEYCLOAK_REALM
        value: docflow
      - key: KEYCLOAK_ADMIN
        sync: false
      - key: KEYCLOAK_ADMIN_PASSWORD
        sync: false

  - type: pserv
    name: upload-service
    env: docker
    dockerfilePath: ./services/upload-service/Dockerfile
    dockerContext: ./services/upload-service
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: MONGO_URI
        sync: false
      - key: MINIO_ENDPOINT
        sync: false
      - key: MINIO_PORT
        value: "9000"
      - key: MINIO_USE_SSL
        value: "false"
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: AIRFLOW_BASE_URL
        value: http://airflow-webserver:8080
      - key: AIRFLOW_USERNAME
        sync: false
      - key: AIRFLOW_PASSWORD
        sync: false
      - key: LOG_LEVEL
        value: info

  - type: pserv
    name: validation-service
    env: docker
    dockerfilePath: ./services/validation-service/Dockerfile
    dockerContext: ./services/validation-service
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3002"
      - key: MONGO_URI
        sync: false
      - key: LOG_LEVEL
        value: info

  - type: pserv
    name: ocr-service
    env: docker
    dockerfilePath: ./services/ocr-service/Dockerfile
    dockerContext: ./services/ocr-service
    envVars:
      - key: PORT
        value: "8001"
      - key: MONGO_URI
        sync: false
      - key: MINIO_ENDPOINT
        sync: false
      - key: MINIO_PORT
        value: "9000"
      - key: MINIO_USE_SSL
        value: "false"
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: LOG_LEVEL
        value: info

  - type: pserv
    name: classification-service
    env: docker
    dockerfilePath: ./services/classification-service/Dockerfile
    dockerContext: ./services/classification-service
    envVars:
      - key: PORT
        value: "8002"
      - key: MINIO_ENDPOINT
        sync: false
      - key: MINIO_PORT
        value: "9000"
      - key: MINIO_USE_SSL
        value: "false"
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: LOG_LEVEL
        value: info

  - type: pserv
    name: extraction-service
    env: docker
    dockerfilePath: ./services/extraction-service/Dockerfile
    dockerContext: ./services/extraction-service
    envVars:
      - key: PORT
        value: "8003"
      - key: MONGO_URI
        sync: false
      - key: MINIO_ENDPOINT
        sync: false
      - key: MINIO_PORT
        value: "9000"
      - key: MINIO_USE_SSL
        value: "false"
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: LOG_LEVEL
        value: info

  - type: web
    name: airflow-webserver
    env: docker
    dockerfilePath: ./services/airflow-pipeline/Dockerfile
    dockerContext: ./services/airflow-pipeline
    dockerCommand: >-
      bash -c "airflow db migrate && airflow users create --username ${AIRFLOW_ADMIN_USER} --password ${AIRFLOW_ADMIN_PASSWORD} --firstname Admin --lastname DocFlow --role Admin --email admin@docflow.io || true && exec airflow webserver"
    healthCheckPath: /health
    envVars:
      - key: AIRFLOW__CORE__EXECUTOR
        value: LocalExecutor
      - key: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
        fromDatabase:
          name: airflow-postgres
          property: connectionString
      - key: AIRFLOW__CORE__FERNET_KEY
        sync: false
      - key: AIRFLOW__CORE__LOAD_EXAMPLES
        value: "false"
      - key: AIRFLOW__WEBSERVER__SECRET_KEY
        sync: false
      - key: AIRFLOW__API__AUTH_BACKENDS
        value: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
      - key: OCR_SERVICE_URL
        value: http://ocr-service:8001
      - key: CLASSIFICATION_SERVICE_URL
        value: http://classification-service:8002
      - key: EXTRACTION_SERVICE_URL
        value: http://extraction-service:8003
      - key: VALIDATION_SERVICE_URL
        value: http://validation-service:3002
      - key: UPLOAD_SERVICE_URL
        value: http://upload-service:3001
      - key: AIRFLOW_ADMIN_USER
        sync: false
      - key: AIRFLOW_ADMIN_PASSWORD
        sync: false
      - key: _AIRFLOW_WWW_USER_CREATE
        value: "true"
      - key: _AIRFLOW_WWW_USER_USERNAME
        sync: false
      - key: _AIRFLOW_WWW_USER_PASSWORD
        sync: false

  - type: worker
    name: airflow-scheduler
    env: docker
    dockerfilePath: ./services/airflow-pipeline/Dockerfile
    dockerContext: ./services/airflow-pipeline
    dockerCommand: >-
      bash -c "airflow db migrate && exec airflow scheduler"
    envVars:
      - key: AIRFLOW__CORE__EXECUTOR
        value: LocalExecutor
      - key: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
        fromDatabase:
          name: airflow-postgres
          property: connectionString
      - key: AIRFLOW__CORE__FERNET_KEY
        sync: false
      - key: AIRFLOW__CORE__LOAD_EXAMPLES
        value: "false"
      - key: OCR_SERVICE_URL
        value: http://ocr-service:8001
      - key: CLASSIFICATION_SERVICE_URL
        value: http://classification-service:8002
      - key: EXTRACTION_SERVICE_URL
        value: http://extraction-service:8003
      - key: VALIDATION_SERVICE_URL
        value: http://validation-service:3002
      - key: UPLOAD_SERVICE_URL
        value: http://upload-service:3001

  - type: web
    name: frontend-crm
    env: docker
    dockerfilePath: ./services/frontend-crm/Dockerfile
    dockerContext: ./services/frontend-crm
    healthCheckPath: /

  - type: web
    name: frontend-compliance
    env: docker
    dockerfilePath: ./services/frontend-compliance/Dockerfile
    dockerContext: ./services/frontend-compliance
    healthCheckPath: /
