x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
  AIRFLOW__CORE__FERNET_KEY: ""
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  EXTRACTION_SERVICE_URL: http://extraction_service:8001
  VALIDATION_SERVICE_URL: http://validation_service:8002
  OCR_SERVICE_URL: http://ocr_service:8003
  CLASSIFIER_SERVICE_URL: http://classifier_service:8004
  MONGODB_URI: ${MONGO_URL}
  MONGODB_DB: ${MONGODB_DB:-documize}

services:
  # ── Storage ──────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # ── Airflow metadata ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ── Airflow ───────────────────────────────────────────────────────────────
  airflow-init:
    image: apache/airflow:2.9.3
    environment: *airflow-env
    entrypoint: /bin/bash
    command:
      - -c
      - >
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Admin --lastname Admin --role Admin --email admin@example.com || true
    depends_on:
      - postgres

  airflow-webserver:
    image: apache/airflow:2.9.3
    environment: *airflow-env
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    command: webserver
    depends_on:
      - airflow-init
      - postgres

  airflow-scheduler:
    image: apache/airflow:2.9.3
    environment: *airflow-env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    command: scheduler
    depends_on:
      - airflow-init
      - postgres

  # ── Extraction Service ────────────────────────────────────────────────────
  extraction_service:
    build:
      context: .
      dockerfile: airflow/dags/services/extraction_service/Dockerfile
      args:
        INSTALL_ML: ${INSTALL_ML:-false}
    environment:
      YOLO_MODEL_PATH: ${YOLO_MODEL_PATH:-}
      SPACY_MODEL: fr_core_news_md
      LOG_LEVEL: INFO
    ports:
      - "8001:8001"
    volumes:
      - ./models:/app/models:ro    # mount your trained .pt weights here
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Validation Service ────────────────────────────────────────────────────
  validation_service:
    build:
      context: .
      dockerfile: airflow/dags/services/validation_service/Dockerfile
    environment:
      INSEE_CLIENT_ID: ${INSEE_CLIENT_ID:-}
      INSEE_CLIENT_SECRET: ${INSEE_CLIENT_SECRET:-}
      MONGODB_URI: ${MONGO_URL}
      MONGODB_DB: ${MONGODB_DB:-documize}
      LOG_LEVEL: INFO
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  minio_data:
  postgres_data:
  airflow_logs:
